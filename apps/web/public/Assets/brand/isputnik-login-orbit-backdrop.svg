<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">iSputnik login orbit backdrop</title>
  <desc id="desc">A text-free retro space backdrop with Earth, Sputnik, stars, and orbit trails.</desc>
  <defs>
