<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">isputnik brand icon</title>
  <desc id="desc">A rounded square brand icon with an orbital ring and a central i-shaped signal.</desc>
  <defs>
    <linearGradient id="bg" x1="72" y1="58" x2="444" y2="458" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16324f"/>
      <stop offset="0.48" stop-color="#24536a"/>
      <stop offset="1" stop-color="#102238"/>
    </linearGradient>
    <linearGradient id="orbit" x1="92" y1="178" x2="436" y2="328" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#86e4d8"/>
      <stop offset="0.56" stop-color="#f8e8b0"/>
      <stop offset="1" stop-color="#f59f5a"/>
    </linearGradient>
    <linearGradient id="signal" x1="224" y1="150" x2="298" y2="374" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff3c8"/>
      <stop offset="1" stop-color="#f59f5a"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#06111f" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <g opacity="0.24" fill="none" stroke="#ffffff" stroke-width="1.5">
    <path d="M86 145c70-42 153-60 248-51"/>
    <path d="M116 398c86 32 181 29 285-12"/>
    <path d="M394 92c24 25 39 54 45 88"/>
  </g>

  <ellipse
    cx="256"
    cy="258"
    rx="185"
    ry="76"
    fill="none"
    stroke="url(#orbit)"
    stroke-width="22"
    stroke-linecap="round"
    transform="rotate(-18 256 258)"
  />

  <circle cx="408" cy="189" r="28" fill="#f8e8b0" filter="url(#shadow)"/>
  <circle cx="408" cy="189" r="11" fill="#16324f" opacity="0.22"/>

  <g filter="url(#shadow)">
    <circle cx="256" cy="166" r="36" fill="url(#signal)"/>
    <rect x="219" y="218" width="74" height="164" rx="37" fill="url(#signal)"/>
    <path
      d="M201 262c24-21 58-29 91-20 24 6 44 20 59 39"
      fill="none"
      stroke="#fff3c8"
      stroke-width="18"
      stroke-linecap="round"
      opacity="0.9"
    />
    <path
      d="M183 321c42 34 96 44 162 31"
      fill="none"
      stroke="#86e4d8"
      stroke-width="16"
      stroke-linecap="round"
      opacity="0.76"
    />
  </g>

  <path
    d="M106 322c37 48 91 77 162 86"
    fill="none"
    stroke="#86e4d8"
    stroke-width="14"
    stroke-linecap="round"
    opacity="0.7"
  />
</svg>
