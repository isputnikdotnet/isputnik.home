services:
  isputnik:
    image: ghcr.io/isputnikdotnet/isputnik.home:latest
    container_name: isputnik
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      # URL used to access the app — change to your server IP or domain
      APP_URL: http://localhost:4000
      # Set to "true" only if serving over HTTPS
      COOKIE_SECURE: "false"
      # Optional overrides
      # SESSION_DAYS: 14
      # INVITE_DAYS: 7
    volumes:
      # App config, database, thumbnails (use appdata on Unraid)
      - /mnt/user/appdata/isputnik:/config
      # Your audiobook library — read-only
      - /path/to/audiobooks:/media:ro
