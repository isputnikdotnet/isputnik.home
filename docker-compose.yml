services:
  isputnik:
    image: ghcr.io/isputnikdotnet/isputnik.home:latest
    container_name: isputnik
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      # URL used to access the app — change to your server IP or domain
      APP_URL: http://localhost:4000
      # Set to "true" only if serving over HTTPS
      COOKIE_SECURE: "false"
      # Number of reverse proxies in front — set when exposing via a proxy (usually 1)
      # so rate limits, auto-block, and trusted zones see the real client IP, not the
      # proxy. Leave unset for direct LAN access. See docs/users/exposing-to-the-internet.md
      # TRUST_PROXY_HOPS: 1
      # Optional overrides
      # SESSION_DAYS: 14
      # INVITE_DAYS: 7
    volumes:
      # App config, database, thumbnails (use appdata on Unraid)
      - /mnt/user/appdata/isputnik:/config
      # Primary media library (required). Mount :ro and set the library's Mode to
      # "External (read-only)" in the app when it's managed by Plex/Audiobookshelf,
      # so this app only views/streams it and never writes to it.
      - /path/to/library:/media:ro
      # Optional additional libraries — uncomment and set paths as needed
      # - /path/to/library2:/media2:ro
      # - /path/to/library3:/media3:ro
